<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Light Mode Gradients -->
    <linearGradient id="spine-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="node-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Dark Mode Gradients -->
    <linearGradient id="spine-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="node-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <!-- The Agent Node Definition (Hollow Hexagon with Floating Core) -->
    <g id="agent-node">
      <!-- Outer Hexagonal Ring (Uses evenodd fill-rule to remain transparent in the center) -->
      <path class="node-ring" fill-rule="evenodd" d="M 0,-16 L 13.9,-8 L 13.9,8 L 0,16 L -13.9,8 L -13.9,-8 Z M 0,-10 L -8.7,-5 L -8.7,5 L 0,10 L 8.7,5 L 8.7,-5 Z" />
      <!-- Floating Central Core -->
      <polygon class="node-core" points="0,-5 4.3,-2.5 4.3,2.5 0,5 -4.3,2.5 -4.3,-2.5" />
    </g>
  </defs>

  <style>
    /* Default (Light Mode Theme) */
    .spine {
      fill: url(#spine-light);
    }
    .bar {
      stroke: #64748b;
      stroke-width: 6;
      stroke-linecap: round;
      fill: none;
    }
    .node-ring {
      fill: url(#node-light);
    }
    .node-core {
      fill: url(#spine-light);
    }

    /* Dark Mode Theme Overrides */
    @media (prefers-color-scheme: dark) {
      .spine {
        fill: url(#spine-dark);
      }
      .bar {
        stroke: #475569;
      }
      .node-ring {
        fill: url(#node-dark);
      }
      .node-core {
        fill: url(#spine-dark);
      }
    }
  </style>

  <!-- Connection Lines (behind the nodes, stopping precisely at node rings to preserve hollow transparency) -->
  <line class="bar" x1="31" y1="32" x2="76" y2="32" />
  <line class="bar" x1="31" y1="64" x2="66" y2="64" />
  <line class="bar" x1="31" y1="96" x2="76" y2="96" />

  <!-- Spine (Vertical Backbone) -->
  <rect class="spine" x="25" y="20" width="12" height="88" rx="6" />

  <!-- Mixture of Agent Nodes (form the three branches of the "E") -->
  <use href="#agent-node" x="89" y="32" />
  <use href="#agent-node" x="79" y="64" />
  <use href="#agent-node" x="89" y="96" />
</svg>